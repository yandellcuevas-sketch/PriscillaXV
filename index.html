<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Un detalle romántico especial de XV años para Priscilla" />
  <meta name="theme-color" content="#0a0f2e" />
  <title>XV Años – Priscilla 💙</title>

  <!-- TIPOGRAFÍAS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       VARIABLES Y RESET
       ============================================================ */
    :root {
      --royal-blue:    #1a3a8f;
      --midnight:      #060d28;
      --sky-blue:      #4f9fff;
      --deep-blue:     #0d1f5c;
      --glass-blue:    rgba(30, 60, 140, 0.25);
      --pearl:         #f0f4ff;
      --silver:        #c8d8f0;
      --gold-soft:     #a8c4e8;
      --glow-blue:     #3a7bd5;
      --heart-red:     #e83a6f;
      --heart-blue:    #4f9fff;
      --kiss-pink:     #ff7ab0;
      --sapphire:      #0f3480;
      --video-ratio:   1.778; /* 16:9 default — sobreescrito por JS */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      background: var(--midnight);
      font-family: 'Outfit', sans-serif;
      color: var(--pearl);
    }

    /* Reducción de movimiento para accesibilidad */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================
       CANVAS DE PARTÍCULAS (fondo global)
       ============================================================ */
    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ============================================================
       ESCENA 1 – PORTADA
       ============================================================ */
    #sceneCover {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(26, 58, 143, 0.55) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(79, 159, 255, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(6, 13, 40, 0.9) 0%, #060d28 100%);
      transition: opacity 1s ease, transform 1s ease;
    }
    #sceneCover.fade-out {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .cover-deco {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      animation: floatY 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(79,159,255,0.7));
    }

    .cover-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 1s 0.4s forwards;
    }

    /* 📝 NOMBRE: "Priscilla" */
    .cover-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 12vw, 5.5rem);
      background: linear-gradient(135deg, #ffffff 0%, #a8d0ff 40%, #4f9fff 70%, #c8d8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.1;
      filter: drop-shadow(0 0 18px rgba(79,159,255,0.5));
      opacity: 0;
      animation: fadeUp 1s 0.7s forwards;
    }

    .cover-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 4vw, 1.35rem);
      color: var(--silver);
      text-align: center;
      margin-top: 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s 1s forwards;
    }

    .cover-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .cover-star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur, 2s) var(--delay, 0s) infinite alternate;
    }

    #btnDiscover {
      position: relative;
      padding: 1rem 2.4rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: #fff;
      background: linear-gradient(135deg, #1a3a8f 0%, #2a5bc8 50%, #4f9fff 100%);
      box-shadow:
        0 0 20px rgba(79,159,255,0.5),
        0 0 60px rgba(26,58,143,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 1s 1.3s forwards;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #btnDiscover::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      animation: shimmerBtn 2.5s 2s infinite;
    }
    #btnDiscover:hover, #btnDiscover:active {
      transform: scale(1.05);
      box-shadow:
        0 0 30px rgba(79,159,255,0.7),
        0 0 80px rgba(26,58,143,0.4),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    /* ============================================================
       ESCENA 2 – VIDEO
       ============================================================ */
    #sceneVideo {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(26,58,143,0.4) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 90%, rgba(79,159,255,0.25) 0%, transparent 50%),
        #060d28;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    #sceneVideo.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .video-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.8rem, 7vw, 3rem);
      background: linear-gradient(135deg, #c8d8f0, #4f9fff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 1rem;
      animation: fadeUp 0.8s forwards;
      filter: drop-shadow(0 0 10px rgba(79,159,255,0.4));
    }

    /* ─── MARCO DEL VIDEO: CONTENEDOR EXTERNO ─── */
    .video-frame {
      position: relative;
      /* Ancho limitado — se adapta al ratio calculado en JS */
      width: min(92vw, 520px);
      /* No exceder altura disponible */
      max-height: 68vh;
      border-radius: 18px;
      animation: frameEntrance 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      transform: scale(0.85) translateY(30px);
      opacity: 0;
      /* El aspect-ratio se calcula en JS mediante --video-ratio */
      aspect-ratio: var(--video-ratio, 16/9);
    }

    /* ─── BORDE EXTERIOR: ZAFIRO + PLATA ─── */
    .video-frame-outer {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      /* Doble borde: zafiro exterior + plata interior */
      padding: 4px;
      background: linear-gradient(135deg,
        #9bbde8 0%,
        #0f3480 15%,
        #c8d8f0 28%,
        #1a3a8f 40%,
        #e8f0ff 50%,
        #1a3a8f 60%,
        #c8d8f0 72%,
        #0f3480 85%,
        #9bbde8 100%);
      background-size: 300% 300%;
      animation: gradientBorder 6s ease infinite;
      box-shadow:
        0 0 0 1px rgba(200,216,240,0.15),
        0 0 25px rgba(79,159,255,0.55),
        0 0 55px rgba(15,52,128,0.35),
        0 16px 50px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* Línea interior plateada muy fina */
    .video-frame-outer::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 17px;
      border: 1px solid rgba(200,216,240,0.30);
      pointer-events: none;
      z-index: 5;
    }

    /* Brillo de barrido lento alrededor del borde */
    .video-frame-outer::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: conic-gradient(
        from var(--sweep-angle, 0deg),
        transparent 0deg,
        rgba(200,216,240,0.7) 20deg,
        transparent 40deg,
        transparent 360deg
      );
      animation: borderSweep 4s linear infinite;
      pointer-events: none;
      z-index: 4;
    }

    /* ─── ZONA INTERIOR DEL MARCO ─── */
    .video-frame-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }

    /* ─── VIDEO AMBIENTAL (fondo desenfocado) ─── */
    .video-ambient {
      position: absolute;
      inset: -6px; /* ligeramente mayor para cubrir bordes del blur */
      width: calc(100% + 12px);
      height: calc(100% + 12px);
      object-fit: cover;
      filter: blur(18px) brightness(0.55) saturate(0.9);
      pointer-events: none;
      z-index: 0;
    }

    /* Overlay azul oscuro sobre el ambiental para que no distraiga */
    .video-ambient-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,13,40,0.38) 0%,
        rgba(6,13,40,0.18) 40%,
        rgba(6,13,40,0.18) 60%,
        rgba(6,13,40,0.38) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Cristal sobre el marco */
    .video-frame-glass {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.03) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.05) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* ─── VIDEO PRINCIPAL ─── */
    #videoXV {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 15px;
      z-index: 2;
    }

    /* ─── MONOGRAMA PXV ─── */
    .frame-monogram {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: rgba(200,216,240,0.75);
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ─── CORONA SVG SOBRE EL MARCO ─── */
    .crown-wrap {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      animation: floatY 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(200,216,240,0.7));
    }

    /* ─── ORNAMENTOS DE ESQUINA SVG ─── */
    .frame-ornament {
      position: absolute;
      width: 36px;
      height: 36px;
      z-index: 6;
      pointer-events: none;
      opacity: 0.85;
    }
    .frame-ornament.tl { top: 5px;  left: 5px;  }
    .frame-ornament.tr { top: 5px;  right: 5px; transform: scaleX(-1); }
    .frame-ornament.bl { bottom: 5px; left: 5px;  transform: scaleY(-1); }
    .frame-ornament.br { bottom: 5px; right: 5px; transform: scale(-1); }

    /* ─── BRILLOS ALREDEDOR DEL MARCO ─── */
    .frame-glow {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,159,255,0.45) 0%, transparent 70%);
      pointer-events: none;
      animation: pulseGlow 3.5s ease-in-out infinite;
      z-index: 7;
    }

    /* ─── ESTRELLAS VECTORIALES EN LAS ESQUINAS ─── */
    .frame-spark {
      position: absolute;
      z-index: 6;
      pointer-events: none;
      animation: twinkle 1.8s ease-in-out infinite alternate;
    }

    /* ============================================================
       TRANSICIÓN ROMÁNTICA
       ============================================================ */
    #sceneTransition {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(26,58,143,0.9) 0%, #060d28 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #sceneTransition.active {
      opacity: 1;
      pointer-events: auto;
    }
    .transition-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 8vw, 4rem);
      color: #fff;
      text-align: center;
      opacity: 0;
      transform: scale(0.7);
      animation: popIn 0.7s 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      filter: drop-shadow(0 0 20px rgba(79,159,255,0.8));
    }

    /* ============================================================
       ESCENA 3 – CARTA
       ============================================================ */
    #sceneLetter {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(26,58,143,0.5) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 85%, rgba(79,159,255,0.3) 0%, transparent 50%),
        #060d28;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #sceneLetter.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Tarjeta de la carta */
    .letter-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem 2rem;
      border-radius: 24px;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.08) 0%,
          rgba(30,60,140,0.18) 40%,
          rgba(79,159,255,0.08) 100%);
      border: 1px solid rgba(200,216,240,0.25);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow:
        0 0 40px rgba(79,159,255,0.25),
        0 0 80px rgba(26,58,143,0.2),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(79,159,255,0.1),
        0 30px 80px rgba(0,0,0,0.5);
      transform: translateY(40px);
      opacity: 0;
      animation: none;
      overflow: visible;
    }
    .letter-card.appear {
      animation: cardAppear 1s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Reflejo de cristal sobre la tarjeta */
    .letter-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0) 100%);
      pointer-events: none;
    }

    /* Borde brillante de la tarjeta */
    .letter-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, #c8d8f0, #1a3a8f, #4f9fff, #c8d8f0);
      background-size: 300% 300%;
      animation: gradientBorder 5s ease infinite;
      z-index: -1;
      opacity: 0.5;
    }

    /* Decoraciones incrustadas en la carta — corazones de esquina */
    .card-deco-heart {
      position: absolute;
      opacity: 0.18;
      pointer-events: none;
    }
    .card-deco-heart.tl { top: 14px; left: 16px; }
    .card-deco-heart.br { bottom: 14px; right: 16px; transform: rotate(180deg); }

    /* Destello decorativo */
    .card-deco-spark {
      position: absolute;
      top: 16px;
      right: 20px;
      opacity: 0.22;
      pointer-events: none;
      animation: twinkle 2.4s ease-in-out infinite alternate;
    }

    /* Monograma Y+P */
    .card-monogram {
      position: absolute;
      bottom: 10px;
      right: 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: rgba(200,216,240,0.35);
      text-transform: uppercase;
      pointer-events: none;
    }

    .letter-icon {
      text-align: center;
      margin-bottom: 1.2rem;
      animation: floatY 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(79,159,255,0.6));
    }

    /* Texto de la carta */
    #letterText {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      font-style: italic;
      color: var(--pearl);
      text-align: center;
      line-height: 1.75;
      min-height: 3em;
      position: relative;
    }
    #letterText .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--sky-blue);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: cursorBlink 0.7s step-end infinite;
    }

    /* "Te amo" */
    #teAmo {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.8rem, 12vw, 5rem);
      background: linear-gradient(135deg, #ff7ab0 0%, #e83a6f 30%, #4f9fff 70%, #c8d8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-top: 1.2rem;
      opacity: 0;
      filter: drop-shadow(0 0 20px rgba(232,58,111,0.5));
      position: relative;
    }
    #teAmo.bounce-in {
      animation: elegantBounce 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Pulso luminoso detrás de "Te amo" */
    #teAmoPulse {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,58,111,0.25) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
    #teAmoPulse.glow {
      animation: teAmoGlow 1.2s ease-out forwards;
    }

    .letter-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4f9fff, transparent);
      margin: 1rem auto;
    }

    /* Línea decorativa romántica */
    .letter-deco-line {
      text-align: center;
      margin: 0.4rem 0 0.2rem;
      opacity: 0.35;
    }

    .letter-footer {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      color: var(--silver);
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1rem;
      opacity: 0;
    }
    .letter-footer.appear {
      animation: fadeUp 0.8s 0.5s forwards;
    }

    /* ============================================================
       ANIMACIONES KEYFRAMES
       ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatY {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(0.8); }
      to   { opacity: 1;   transform: scale(1.3); }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes shimmerBtn {
      0%   { left: -60%; }
      100% { left: 130%; }
    }
    @keyframes gradientBorder {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes borderSweep {
      from { --sweep-angle: 0deg; }
      to   { --sweep-angle: 360deg; }
    }
    @keyframes frameEntrance {
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes cardAppear {
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 0.6;  transform: scale(1.18); }
    }
    /* "Te amo" rebote refinado: escala 0.75 → 1.08 → 1 */
    @keyframes elegantBounce {
      0%   { opacity: 0; transform: scale(0.75) translateY(16px); }
      55%  { opacity: 1; transform: scale(1.08) translateY(-4px); }
      78%  { transform: scale(0.98) translateY(2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes teAmoGlow {
      0%   { opacity: 0; transform: scale(0.6); }
      40%  { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.4); }
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* ─── Partícula: corazón SVG flotante ─── */
    @keyframes svgHeartFloat {
      0%   { opacity: 0;   transform: translate(0,0) scale(0.55) rotate(var(--rot,0deg)); }
      18%  { opacity: var(--peak-op, 0.9); transform: translate(var(--wx1,0px), -14px) scale(1) rotate(var(--rot,0deg)); }
      60%  { opacity: var(--peak-op, 0.9); transform: translate(var(--wx2,4px), calc(var(--travel,-140px) * 0.55)) scale(var(--sf,0.85)) rotate(calc(var(--rot,0deg) * 0.5)); }
      100% { opacity: 0;   transform: translate(var(--wx3,-4px), var(--travel,-140px)) scale(var(--sf,0.7)) rotate(var(--rot2,18deg)); }
    }

    /* ─── Partícula: destello SVG ─── */

  <!-- ============================================================

  <script>
    'use strict';

    /* ============================================================
       CONFIGURACIÓN PERSONALIZABLE
       ============================================================ */
    const CONFIG = {
      letterMessage: 'Un detallito de tu gran novio Yandell',
      typeSpeed: 55,
      musicFile: './musica.mp3',
      musicVolume: 0.30,
      musicVolumeVideo: 0.06,
    };

    /* ============================================================
       ESTADO GLOBAL
       ============================================================ */
    let bgMusic      = null;
    let bgMusicReady = false;

    /* Contador de partículas activas */
    let activeParticles = 0;
    const MAX_PARTICLES = 16;

    /* Temporizadores a limpiar */
    let videoHeartInterval = null;
    let kissesInterval     = null;
    let burstLoop          = null;

    /* ============================================================
       CANVAS DE ESTRELLAS DE FONDO
       ============================================================ */
    (function initStarCanvas() {
      const canvas = document.getElementById('particleCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H, stars = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        stars = [];
        const count = Math.min(Math.floor(W * H / 4500), 180);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            a: Math.random(),
            da: (Math.random() * 0.005 + 0.002) * (Math.random() < 0.5 ? 1 : -1),
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.a += s.da;
          if (s.a > 1 || s.a < 0) s.da *= -1;
          ctx.save();
          ctx.globalAlpha = Math.max(0, s.a);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = '#c8d8f0';
          ctx.fill();
          ctx.restore();
        });
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      window.addEventListener('resize', resize);
    })();

    /* ============================================================
       ESTRELLAS EN LA PORTADA
       ============================================================ */
    (function buildCoverStars() {
      const container = document.getElementById('coverStars');
      for (let i = 0; i < 40; i++) {
        const s = document.createElement('span');
        s.className = 'cover-star';
        s.style.cssText = `
          left: ${Math.random() * 100}%;
          top:  ${Math.random() * 100}%;
          --dur:   ${(Math.random() * 2 + 1.5).toFixed(1)}s;
          --delay: ${(Math.random() * 3).toFixed(1)}s;
          width:   ${Math.random() < 0.2 ? 3 : 2}px;
          height:  ${Math.random() < 0.2 ? 3 : 2}px;
          opacity: ${Math.random().toFixed(2)};
        `;
        container.appendChild(s);
      }
    })();

    /* ============================================================
       AUDIO
       ============================================================ */
    function initAudio() {
      if (bgMusicReady) return;
      bgMusicReady = true;
      bgMusic = new Audio(CONFIG.musicFile);
      bgMusic.loop   = true;
      bgMusic.volume = CONFIG.musicVolume;
      bgMusic.addEventListener('error', () => { bgMusic = null; });
      bgMusic.play().catch(() => { bgMusic = null; });
    }

    function pauseMusic() {
      if (bgMusic && !bgMusic.paused) bgMusic.volume = CONFIG.musicVolumeVideo;
    }
    function resumeMusic() {
      if (bgMusic) {
        bgMusic.volume = CONFIG.musicVolume;
        if (bgMusic.paused) bgMusic.play().catch(() => {});
      }
    }

    /* ============================================================
       VIBRACIÓN (con tolerancia a fallos — iPhone no soporta)
       ============================================================ */
    function vibrate(pattern) {
      try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (_) {}
    }

    /* ============================================================
       VIDEO AMBIENTAL — SINCRONIZACIÓN CON VIDEO PRINCIPAL
       ============================================================ */
    function initAmbientSync(main, ambient) {
      if (!ambient) return;

      // Copiar estado al cargar
      ambient.muted  = true;
      ambient.volume = 0;

      const DRIFT_THRESHOLD = 0.15; // segundos

      function syncTime() {
        if (Math.abs(ambient.currentTime - main.currentTime) > DRIFT_THRESHOLD) {
          ambient.currentTime = main.currentTime;
        }
      }

      main.addEventListener('play',       () => { ambient.play().catch(() => {}); syncTime(); });
      main.addEventListener('pause',      () => { ambient.pause(); });
      main.addEventListener('seeking',    () => { ambient.currentTime = main.currentTime; });
      main.addEventListener('ratechange', () => { ambient.playbackRate = main.playbackRate; });
      main.addEventListener('ended',      () => { ambient.pause(); });

      // Corrección de drift cada 4 segundos (no por frame)
      let driftTimer = null;
      main.addEventListener('play',  () => { driftTimer = setInterval(syncTime, 4000); });
      main.addEventListener('pause', () => { clearInterval(driftTimer); });
      main.addEventListener('ended', () => { clearInterval(driftTimer); });
    }

    /* ============================================================
       DETECCIÓN DE RATIO Y AJUSTE DEL MARCO
       ============================================================ */
    function applyVideoRatio(videoEl, frameEl) {
      function onMeta() {
        const w = videoEl.videoWidth;
        const h = videoEl.videoHeight;
        if (!w || !h) return;
        const ratio = w / h;
        frameEl.style.setProperty('--video-ratio', ratio);
        frameEl.style.aspectRatio = ratio;
      }
      videoEl.addEventListener('loadedmetadata', onMeta, { once: true });
      // Si ya está cargado
      if (videoEl.readyState >= 1) onMeta();
    }

    /* ============================================================
       SISTEMA DE PARTÍCULAS SVG PREMIUM
       ============================================================ */

    /* ─── Generadores SVG reutilizables ─── */

    // Corazón vectorial CSS — gradiente zafiro→cielo
    function svgHeart(size, variant) {
      const grads = [
        ['#4f9fff','#1a3a8f'],   // azul zafiro
        ['#c8d8f0','#4f9fff'],   // perla→cielo
        ['#6ab4ff','#0f3480'],   // cielo→medianoche
        ['#e0ecff','#a8c4e8'],   // blanco perlado
      ];
      const g = grads[variant % grads.length];
      const id = `hg_${Math.floor(Math.random()*9999)}`;
      return `<svg width="${size}" height="${size*0.9}" viewBox="0 0 22 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${g[0]}"/>
            <stop offset="100%" stop-color="${g[1]}"/>
          </linearGradient>
          <radialGradient id="${id}r" cx="40%" cy="35%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <path d="M11 18 C11 18 1 11.5 1 5.5 C1 2.5 3.5 1 6 1 C8 1 10 2.5 11 4 C12 2.5 14 1 16 1 C18.5 1 21 2.5 21 5.5 C21 11.5 11 18 11 18Z"
              fill="url(#${id})" opacity="0.88"/>
        <path d="M11 18 C11 18 1 11.5 1 5.5 C1 2.5 3.5 1 6 1 C8 1 10 2.5 11 4 C12 2.5 14 1 16 1 C18.5 1 21 2.5 21 5.5 C21 11.5 11 18 11 18Z"
              fill="url(#${id}r)" opacity="0.5"/>
      </svg>`;
    }

    // Destello vectorial de cuatro puntas
    function svgSpark(size) {
      const id = `sg_${Math.floor(Math.random()*9999)}`;
      return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="60%" stop-color="#c8d8f0"/>
            <stop offset="100%" stop-color="rgba(79,159,255,0)"/>
          </radialGradient>
        </defs>
        <path d="M8 0 L8.55 7.45 L16 8 L8.55 8.55 L8 16 L7.45 8.55 L0 8 L7.45 7.45 Z"
              fill="url(#${id})"/>
        <circle cx="8" cy="8" r="1.5" fill="rgba(255,255,255,0.9)"/>
      </svg>`;
    }

    // Labios SVG — silueta elegante
    function svgLips(size) {
      const id = `lg_${Math.floor(Math.random()*9999)}`;
      return `<svg width="${size}" height="${size*0.6}" viewBox="0 0 40 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffaad4"/>
            <stop offset="50%" stop-color="#e05090"/>
            <stop offset="100%" stop-color="#c03070"/>
          </linearGradient>
          <radialGradient id="${id}h" cx="50%" cy="30%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <!-- Labio superior -->
        <path d="M4 12 Q12 2 20 9 Q28 2 36 12 Q28 10 20 13 Q12 10 4 12Z"
              fill="url(#${id})" opacity="0.9"/>
        <!-- Labio inferior -->
        <path d="M4 12 Q12 22 20 21 Q28 22 36 12 Q28 16 20 17 Q12 16 4 12Z"
              fill="url(#${id})" opacity="0.85"/>
        <!-- Brillo -->
        <ellipse cx="16" cy="8" rx="5" ry="2.5" fill="url(#${id}h)" opacity="0.7"/>
      </svg>`;
    }

    /* ─── Función central de spawn ─── */
    function spawnSVGParticle(type, x, y, opts = {}) {
      if (activeParticles >= MAX_PARTICLES) return;
      if (document.hidden) return; // pestaña oculta

      activeParticles++;

      const el = document.createElement('div');
      el.setAttribute('aria-hidden', 'true');
      el.style.cssText = `
        position: fixed;
        left: ${x}px;
        top:  ${y}px;
        pointer-events: none;
        z-index: 100;
        user-select: none;
        line-height: 0;
        will-change: transform, opacity;
      `;

      const size     = opts.size     || (Math.random() * 14 + 14);
      const travel   = opts.travel   || -(Math.random() * 110 + 70);
      const duration = opts.duration || (Math.random() * 1.4 + 1.8);
      const delay    = opts.delay    || 0;
      const rot      = (Math.random() * 30 - 15).toFixed(1);
      const rot2     = (Math.random() * 24 - 12).toFixed(1);
      const sf       = (Math.random() * 0.3 + 0.72).toFixed(2);
      const wx1      = (Math.random() * 12 - 6).toFixed(1);
      const wx2      = (Math.random() * 20 - 10).toFixed(1);
      const wx3      = (Math.random() * 16 - 8).toFixed(1);
      const peakOp   = (Math.random() * 0.25 + 0.7).toFixed(2);
      const variant  = Math.floor(Math.random() * 4);

      let innerSVG = '';
      let animName = 'svgHeartFloat';
      if (type === 'heart') {
        innerSVG = svgHeart(size, variant);
        animName = 'svgHeartFloat';
      } else if (type === 'spark') {
        innerSVG = svgSpark(size * 0.75);
        animName = 'svgSparkFloat';
        const sx = (Math.random() * 18 - 9).toFixed(1);
        const sy = -(Math.random() * 16 + 6).toFixed(1);
        const ex = (Math.random() * 28 - 14).toFixed(1);
        const ey = -(Math.random() * 50 + 30).toFixed(1);
        el.style.setProperty('--sx', sx + 'px');
        el.style.setProperty('--sy', sy + 'px');
        el.style.setProperty('--ex', ex + 'px');
        el.style.setProperty('--ey', ey + 'px');
      } else if (type === 'lips') {
        innerSVG = svgLips(size * 1.1);
        animName = 'svgLipsFloat';
      }

      el.innerHTML = innerSVG;
      el.style.setProperty('--travel',   travel + 'px');
      el.style.setProperty('--rot',      rot    + 'deg');
      el.style.setProperty('--rot2',     rot2   + 'deg');
      el.style.setProperty('--sf',       sf);
      el.style.setProperty('--wx1',      wx1    + 'px');
      el.style.setProperty('--wx2',      wx2    + 'px');
      el.style.setProperty('--wx3',      wx3    + 'px');
      el.style.setProperty('--peak-op',  peakOp);
      el.style.animation = `${animName} ${duration}s ${delay}s cubic-bezier(0.22,1,0.36,1) forwards`;

      document.body.appendChild(el);

      const totalMs = (duration + delay) * 1000 + 80;
      setTimeout(() => {
        el.remove();
        activeParticles = Math.max(0, activeParticles - 1);
      }, totalMs);
    }

    /* ─── Tipo aleatorio según distribución 65/20/15 ─── */
    function randomParticleType() {
      const r = Math.random();
      if (r < 0.65) return 'heart';
      if (r < 0.85) return 'spark';
      return 'lips';
    }

    /* ─── Lanzar lluvia con sistema de carriles ─── */
    function rainParticles(container, total) {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const laneCount = 8;
      const laneW     = window.innerWidth / laneCount;
      let   laneIdx   = 0;
      let   spawned   = 0;

      // Espaciar salidas entre 120 y 240 ms
      const intervalMs = 150;

      const timer = setInterval(() => {
        if (spawned >= total || document.hidden) {
          clearInterval(timer);
          return;
        }
        if (activeParticles >= MAX_PARTICLES) return;

        const type  = randomParticleType();
        const lane  = laneIdx % laneCount;
        const x     = lane * laneW + laneW / 2 + (Math.random() * 20 - 10);
        const y     = -20;
        const size  = Math.random() * 16 + 16;
        const dur   = Math.random() * 1.2 + 1.8;

        // Para la lluvia usamos animación de caída, no de flotación
        const delayMs = 0;
        const el = document.createElement('div');
        el.setAttribute('aria-hidden', 'true');
        el.style.cssText = `
          position: fixed;
          left: ${x}px;
          top:  ${y}px;
          pointer-events: none;
          z-index: 25;
          user-select: none;
          line-height: 0;
          will-change: transform, opacity;
          --rot:  ${(Math.random() * 30 - 15).toFixed(1)}deg;
          --rot2: ${(Math.random() * 50 - 25).toFixed(1)}deg;
          animation: transRain ${dur}s linear forwards;
        `;

        if (type === 'heart') el.innerHTML = svgHeart(size, Math.floor(Math.random()*4));
        else if (type === 'spark') el.innerHTML = svgSpark(size * 0.7);
        else el.innerHTML = svgLips(size);

        container.appendChild(el);
        activeParticles++;
        spawned++;
        laneIdx++;

        setTimeout(() => {
          el.remove();
          activeParticles = Math.max(0, activeParticles - 1);
        }, dur * 1000 + 150);
      }, intervalMs);
    }

    /* ─── Lanzar partículas desde un elemento ─── */
    function burstFrom(element, count) {
      if (!element) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const rect = element.getBoundingClientRect();
      for (let i = 0; i < count; i++) {
        if (activeParticles >= MAX_PARTICLES) break;
        const type = randomParticleType();
        const x    = rect.left + Math.random() * rect.width;
        const y    = rect.top  + Math.random() * rect.height * 0.4;
        spawnSVGParticle(type, x, y, {
          delay: Math.random() * 0.8,
          size:  Math.random() * 12 + 12,
        });
      }
    }

    /* ─── Explosión radial organizada alrededor de "Te amo" ─── */
    function heartExplosion() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const teAmo = document.getElementById('teAmo');
      if (!teAmo) return;

      const rect = teAmo.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;

      // FASE 1: Pulso luminoso
      const pulse = document.getElementById('teAmoPulse');
      if (pulse) {
        pulse.classList.remove('glow');
        void pulse.offsetWidth; // reflow
        pulse.classList.add('glow');
      }

      // FASE 2: Corona radial de 14 partículas en ángulos predeterminados
      const anglesRad = Array.from({length: 14}, (_, i) => (Math.PI * 2 / 14) * i - Math.PI / 2);
      const typeSeq   = ['heart','spark','lips','heart','heart','spark','heart','lips','heart','spark','heart','heart','spark','heart'];
      const distances = [45, 38, 52, 42, 48, 36, 55, 40, 44, 50, 38, 46, 35, 53];

      anglesRad.forEach((angle, i) => {
        setTimeout(() => {
          if (activeParticles >= MAX_PARTICLES) return;
          const dist = distances[i % distances.length];
          const ox = cx + Math.cos(angle) * dist;
          const oy = cy + Math.sin(angle) * dist;
          spawnSVGParticle(typeSeq[i], ox, oy, {
            size:     Math.random() * 10 + 14,
            travel:   -(Math.random() * 90 + 70),
            duration: Math.random() * 1.2 + 1.6,
            delay:    0,
          });
        }, i * 60); // retraso progresivo de 60ms
      });

      // FASE 3: 5 partículas ascendentes lentas desde el texto
      setTimeout(() => {
        for (let i = 0; i < 5; i++) {
          if (activeParticles >= MAX_PARTICLES) break;
          const x = rect.left + (rect.width / 5) * i + rect.width / 10;
          const y = rect.top - 10;
          spawnSVGParticle('heart', x, y, {
            size:     Math.random() * 8 + 10,
            travel:   -(Math.random() * 130 + 90),
            duration: Math.random() * 1.5 + 2.2,
            delay:    Math.random() * 0.4,
          });
        }
      }, 900);
    }

    /* ─── Besos periódicos durante la escritura ─── */
    function periodicKisses() {
      const card = document.getElementById('letterCard');
      if (!card) return;
      let count = 0;
      kissesInterval = setInterval(() => {
        if (count >= 8) { clearInterval(kissesInterval); return; }
        if (activeParticles < MAX_PARTICLES) burstFrom(card, 1);
        count++;
      }, 700);
    }

    /* ─── Corazones ambientales sobre el marco ─── */
    function startVideoHearts() {
      const frame = document.getElementById('videoFrame');
      if (!frame || videoHeartInterval) return;
      videoHeartInterval = setInterval(() => {
        if (Math.random() < 0.55 && activeParticles < MAX_PARTICLES) {
          burstFrom(frame, 1);
        }
      }, 2400);
    }

    function stopVideoHearts() {
      if (videoHeartInterval) {
        clearInterval(videoHeartInterval);
        videoHeartInterval = null;
      }
    }

    /* ─── Pausa de partículas cuando la pestaña no está visible ─── */
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopVideoHearts();
      }
    });

    /* ============================================================
       MÁQUINA DE ESCRIBIR
       ============================================================ */
    function typeWriter(targetEl, text, speed, onChar, onDone) {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.setAttribute('aria-hidden', 'true');

      function step() {
        if (i < text.length) {
          targetEl.textContent = text.slice(0, i + 1);
          targetEl.appendChild(cursor);
          if (onChar) onChar(i);
          i++;
          setTimeout(step, speed + Math.random() * 30 - 15);
        } else {
          cursor.remove();
          if (onDone) onDone();
        }
      }
      targetEl.textContent = '';
      targetEl.appendChild(cursor);
      setTimeout(step, 300);
    }

    /* ============================================================
       FLUJO PRINCIPAL
       ============================================================ */
    const sceneCover      = document.getElementById('sceneCover');
    const sceneVideo      = document.getElementById('sceneVideo');
    const sceneTransition = document.getElementById('sceneTransition');
    const sceneLetter     = document.getElementById('sceneLetter');
    const btnDiscover     = document.getElementById('btnDiscover');
    const videoEl         = document.getElementById('videoXV');
    const videoAmbient    = document.getElementById('videoAmbient');
    const videoFrame      = document.getElementById('videoFrame');
    const letterCard      = document.getElementById('letterCard');
    const letterText      = document.getElementById('letterText');
    const teAmoEl         = document.getElementById('teAmo');
    const letterFooter    = document.getElementById('letterFooter');

    /* Inicializar sincronización ambiental y ratio */
    initAmbientSync(videoEl, videoAmbient);
    applyVideoRatio(videoEl, videoFrame);

    /* ---------- PASO 1: Botón "Descubrir" ---------- */
    btnDiscover.addEventListener('click', () => {
      initAudio();
      vibrate(30);

      sceneCover.classList.add('fade-out');

      setTimeout(() => {
        sceneCover.style.display = 'none';

        sceneVideo.setAttribute('aria-hidden', 'false');
        sceneVideo.classList.add('visible');

        const frame = document.querySelector('.video-frame');
        if (frame) {
          requestAnimationFrame(() => {
            frame.style.animation = 'frameEntrance 1.2s cubic-bezier(0.22,1,0.36,1) forwards';
          });
        }

        pauseMusic();

        setTimeout(startVideoHearts, 2200);

        videoEl.addEventListener('error', () => {
          console.warn('[XV] No se pudo cargar video.mp4. Continuando a la carta…');
          showTransitionToLetter();
        });

      }, 900);
    });

    /* ---------- PASO 2: Video termina → Transición ---------- */
    videoEl.addEventListener('ended', () => {
      showTransitionToLetter();
    });

    function showTransitionToLetter() {
      stopVideoHearts();

      sceneVideo.style.transition = 'opacity 1s ease';
      sceneVideo.style.opacity = '0';

      setTimeout(() => {
        sceneVideo.style.display = 'none';
        sceneVideo.setAttribute('aria-hidden', 'true');

        sceneTransition.setAttribute('aria-hidden', 'false');
        sceneTransition.classList.add('active');

        rainParticles(sceneTransition, 40);

        setTimeout(() => vibrate([40, 30, 60]), 300);

        setTimeout(() => {
          sceneTransition.style.opacity = '0';
          setTimeout(() => {
            sceneTransition.classList.remove('active');
            sceneTransition.setAttribute('aria-hidden', 'true');
            showLetter();
          }, 600);
        }, 2800);

      }, 950);
    }

    /* ---------- PASO 3: Mostrar carta ---------- */
    function showLetter() {
      resumeMusic();

      sceneLetter.setAttribute('aria-hidden', 'false');
      sceneLetter.classList.add('visible');

      setTimeout(() => {
        letterCard.classList.add('appear');

        setTimeout(() => vibrate(20), 800);

        setTimeout(() => {
          periodicKisses();

          typeWriter(
            letterText,
            CONFIG.letterMessage,
            CONFIG.typeSpeed,
            (charIndex) => {
              if (charIndex === Math.floor(CONFIG.letterMessage.length / 2)) {
                vibrate(15);
              }
            },
            () => {
              vibrate([30, 20, 50]);

              setTimeout(() => {
                teAmoEl.classList.add('bounce-in');
                teAmoEl.style.opacity = '1';

                setTimeout(() => vibrate([80, 50, 120]), 300);

                setTimeout(() => {
                  heartExplosion();
                  letterFooter.classList.add('appear');
                }, 500);

                // Partículas continuas moderadas post-explosión
                let burst = 0;
                burstLoop = setInterval(() => {
                  if (burst >= 10) { clearInterval(burstLoop); return; }
                  if (activeParticles < MAX_PARTICLES) burstFrom(teAmoEl, 1);
                  burst++;
                }, 1000);

              }, 600);
            }
          );
        }, 1000);

      }, 300);
    }

    /* ============================================================
       ACCESIBILIDAD: prefers-reduced-motion
       ============================================================ */
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      // Las funciones de spawn ya incluyen la comprobación internamente
      // Aquí solo anulamos las que se llaman desde el flujo externo
      window._rainDisabled = true;
    }

  </script>
